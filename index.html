<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chicken Timeline</title>
  
  <script type="text/javascript" src="https://unpkg.com/vis-timeline@latest/standalone/umd/vis-timeline-graph2d.min.js"></script>
  <link href="https://unpkg.com/vis-timeline@latest/styles/vis-timeline-graph2d.min.css" rel="stylesheet" type="text/css" />

  <style>
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      overflow: hidden; 
      display: flex; flex-direction: column;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    header {
      padding: 15px 20px;
      background-color: #ffffff;
      border-bottom: 1px solid #ddd;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .titles { flex-grow: 1; }
    h1 { margin: 0; font-size: 22px; color: #333; }
    .subtitle { margin: 4px 0 0 0; font-size: 13px; color: #666; font-style: italic; }

    #visualization {
      flex-grow: 1;
      width: 100vw;
      border: none;
    }

    .vis-label { font-size: 15px; font-weight: bold; }
    .label-dead { color: #c62828 !important; }

    .event-note {
      display: block;
      font-size: 11px;
      margin-top: 8px;
      font-weight: normal;
      opacity: 0.85;
      line-height: 1.2;
    }

    .vis-item.got-chicken { background-color: #d1f7d1 !important; border-color: #2e7d32 !important; }
    .vis-item.dead-missing { background-color: #f7d1d1 !important; border-color: #c62828 !important; color: #7f0000 !important; }
    .vis-current-time { background-color: #ff0000; width: 2px; }

    #music-btn {
      background: #f0f0f0;
      border: 1px solid #ccc;
      padding: 8px 12px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 12px;
    }
  </style>
</head>
<body>

  <header>
    <div class="titles">
        <h1>Chicken Events Timeline</h1>
        <p class="subtitle">Arrivals and "Departures"</
